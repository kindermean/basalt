<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Музычка</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            /* Фон с градиентом для красоты стекла */
            background-image: 
                radial-gradient(circle at 15% 15%, #4f46e5 0%, transparent 25%),
                radial-gradient(circle at 85% 85%, #db2777 0%, transparent 25%);
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        .player-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        }

        h1 {
            color: white;
            font-size: 1.2rem;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.8;
        }

        /* Стеклянная кнопка */
        .glass-btn {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            position: relative;
            outline: none;
        }

        /* Иконка Play (треугольник) */
        .icon {
            width: 0;
            height: 0;
            border-top: 15px solid transparent;
            border-bottom: 15px solid transparent;
            border-left: 25px solid white;
            margin-left: 8px;
            transition: 0.3s;
        }

        /* Класс для изменения иконки на паузу */
        .is-playing .icon {
            border: none;
            width: 20px;
            height: 30px;
            border-left: 6px solid white;
            border-right: 6px solid white;
            margin-left: 0;
        }

        .glass-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
            border-color: rgba(255, 255, 255, 0.4);
        }

        .glass-btn:active {
            transform: scale(0.9);
            box-shadow: inset 0 5px 10px rgba(0,0,0,0.4);
        }

        /* Анимация свечения при игре */
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.2); }
            70% { box-shadow: 0 0 0 30px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }

        .active-pulse {
            animation: pulse 2s infinite;
            border-color: rgba(255, 255, 255, 0.6);
        }

        #status {
            color: rgba(255, 255, 255, 0.5);
            margin-top: 20px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="player-card">
        <h1>Музычка</h1>
        
        <button class="glass-btn" id="mainButton">
            <div class="icon" id="btnIcon"></div>
        </button>

        <p id="status">Нажми, чтобы послушать</p>
    </div>

    <audio id="audioTrack">
        <source src="BandLabSong.mp3" type="audio/mpeg">
    </audio>

    <script>
        const btn = document.getElementById('mainButton');
        const audio = document.getElementById('audioTrack');
        const status = document.getElementById('status');

        btn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                btn.classList.add('is-playing', 'active-pulse');
                status.innerText = "Сейчас играет...";
            } else {
                audio.pause();
                btn.classList.remove('is-playing', 'active-pulse');
                status.innerText = "Пауза";
            }
        });

        // Когда трек закончится
        audio.onended = () => {
            btn.classList.remove('is-playing', 'active-pulse');
            status.innerText = "Завершено";
        };
    </script>

</body>
</html>
